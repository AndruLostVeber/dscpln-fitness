<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness AI</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; background: #0D0D0F; color: #fff; }
      input, select, textarea { font: inherit; background: #1E1E26; color: #fff; border: 1px solid #2A2A35; border-radius: 12px; padding: 12px 14px; outline: none; }
      input::placeholder, textarea::placeholder { color: #404050; }
      input:focus, select:focus, textarea:focus { border-color: #FF6B35; }
      button { font: inherit; cursor: pointer; border: none; background: none; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      ::-webkit-scrollbar { width: 0; }
      * { -webkit-tap-highlight-color: transparent; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
