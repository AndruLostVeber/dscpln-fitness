  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness AI</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, sans-serif; }
      input, select, button, textarea { font: inherit; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; }
      button { cursor: pointer; background: #f0f0f0; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      input:focus, select:focus { outline: 2px solid #007bff; border-color: #007bff; }
    </style>
  </head>

    <div id="root"></div>
